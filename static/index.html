<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>彤熠OCR网关 (TongYiOCR) · 测试台</title>
<style>
  *{box-sizing:border-box;} body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f1320;color:#e8e8e8;}
  header{background:#1b2030;padding:12px 18px;font-weight:600;border-bottom:1px solid #2a3148;}
  .wrap{padding:18px;max-width:1180px;margin:0 auto;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:10px 0;}
  button{background:#3a7afe;color:#fff;border:0;border-radius:6px;padding:8px 14px;cursor:pointer;}
  button.sec{background:#222a40;color:#cdd;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  select,input[type=text]{background:#161c2b;color:#e8e8e8;border:1px solid #2a3148;border-radius:6px;padding:7px 9px;}
  label{font-size:13px;color:#9fb0d0;}
  pre{background:#11151f;border:1px solid #232a3c;border-radius:8px;padding:12px;overflow:auto;font-size:12px;max-height:340px;}
  /* 接口响应报文预览：整段换行、只纵向滚动，杜绝横向滚动条 */
  #out,#qinfo{white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;overflow-x:hidden;overflow-y:auto;}
  .hint{color:#7e8aa8;font-size:12px;margin:6px 0;}
  .engines{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .eng{background:#161c2b;border:1px solid #2a3148;border-radius:8px;padding:10px 12px;min-width:220px;}
  .eng h4{margin:0 0 6px;font-size:14px;}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#555;margin-right:6px;vertical-align:middle;}
  .dot.on{background:#3ad07a;} .dot.off{background:#d05a3a;}
  .card{background:#161c2b;border:1px solid #2a3148;border-radius:8px;padding:14px;margin:14px 0;}
  .card h3{margin:0 0 10px;font-size:15px;}
  .pages{display:flex;flex-direction:column;gap:12px;margin-top:10px;}
  .page{border:1px solid #232a3c;border-radius:8px;padding:10px;background:#11151f;}
  .page .pmeta{font-size:12px;color:#9fb0d0;margin-bottom:6px;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0;}
  .chip{background:#222a40;border-radius:12px;padding:2px 9px;font-size:11px;color:#bcd;}
  .crops{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .crop img{height:64px;border:1px solid #2a3148;border-radius:4px;background:#fff;}
  .md-out{background:#fafafa;color:#111;border-radius:8px;padding:10px;margin-top:6px;font-size:13px;overflow:auto;max-height:220px;}
  .taskbar{font-size:13px;color:#bcd;margin-top:8px;}
  .progress{height:8px;background:#222a40;border-radius:4px;overflow:hidden;margin-top:6px;}
  .progress>div{height:100%;background:#3a7afe;width:0;}

  /* ===== 结构化 Markdown 呈现 ===== */
  .view-tabs{display:flex;gap:6px;align-items:center;margin:8px 0;flex-wrap:wrap;}
  .view-tabs button{font-size:12px;padding:5px 11px;background:#222a40;color:#cdd;border-radius:6px;cursor:pointer;border:0;}
  .view-tabs button.active{background:#3a7afe;color:#fff;}
  .md-render{background:#fafafa;color:#111;border-radius:8px;padding:12px 14px;margin-top:6px;font-size:13px;line-height:1.6;overflow-y:auto;overflow-x:hidden;max-height:360px;white-space:normal;word-break:break-word;}
  .md-render>*:first-child{margin-top:0;}
  .md-render h1,.md-render h2,.md-render h3,.md-render h4{margin:.5em 0 .3em;line-height:1.3;}
  .md-render h1{font-size:1.5em;border-bottom:1px solid #ddd;padding-bottom:.25em;}
  .md-render h2{font-size:1.3em;border-bottom:1px solid #eee;padding-bottom:.2em;}
  .md-render h3{font-size:1.12em;}
  .md-render p{margin:.5em 0;}
  .md-render ul,.md-render ol{margin:.4em 0;padding-left:1.5em;}
  .md-render li{margin:.2em 0;}
  .md-render code{background:#eee;padding:1px 4px;border-radius:4px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.92em;}
  .md-render pre{background:#1e2433;color:#e8e8e8;padding:10px 12px;border-radius:6px;overflow-x:hidden;white-space:pre-wrap;word-break:break-word;}
  .md-render pre code{background:none;color:inherit;padding:0;}
  .md-render table{border-collapse:collapse;margin:.5em 0;font-size:.92em;width:100%;table-layout:fixed;}
  .md-render th,.md-render td{border:1px solid #ccc;padding:4px 8px;text-align:left;vertical-align:top;word-break:break-word;overflow-wrap:anywhere;}
  .md-render th{background:#f0f0f0;}
  .md-render blockquote{margin:.5em 0;padding:.3em .8em;border-left:3px solid #ccc;color:#555;}
  .md-render img{max-width:100%;border:1px solid #ddd;border-radius:4px;}
  .md-render hr{border:none;border-top:1px solid #ddd;margin:.8em 0;}

/* ===== 排版还原视图 ===== */
.layout-wrap{position:relative;margin-top:8px;}
.layout-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.layout-toolbar label{font-size:11px;color:#9fb0d0;}
.layout-toolbar input[type=range]{width:120px;accent-color:#3a7afe;}
.layout-zoom-label{font-size:11px;color:#7e8aa8;min-width:42px;text-align:center;font-weight:600;}
.layout-view{position:relative;border:2px solid #3a7afe;border-radius:10px;overflow:auto;background:#f5f6f8;}
.layout-page{position:relative;margin:0 auto;display:inline-block;background:#fff;}   /* 由内部 img 撑开尺寸；白底用于还原层显示 */
.layout-page>img.bg{display:block;border-radius:4px;min-width:200px;} /* 防止缩成极小方块 */
.layout-img-status{text-align:center;padding:6px;font-size:11px;color:#9fe6b0;font-weight:600;letter-spacing:.5px;}
.layout-img-status.err{color:#ff7a7a;}
  /* 默认：不显示原图底图，只呈现结构化还原层（白底上的 bbox 叠加）；
     勾选"显示原图"后（.layout-page.show-original）才把原图显示出来做对照 */
  .layout-page:not(.show-original)>img.bg{visibility:hidden;}
  .layout-box{position:absolute;overflow:hidden;font-size:11px;line-height:1.5;color:#111;background:transparent;padding:2px 4px;box-sizing:border-box;text-shadow:0 0 2px #fff,0 0 2px #fff,0 0 4px #fff,0 0 4px #000;min-height:1.6em;min-width:3em;}
  .layout-box>img{display:block;width:100%;height:100%;object-fit:contain;border-radius:2px;}
  .layout-box.show-border{outline:1px solid rgba(58,122,254,.95);background:rgba(58,122,254,.18);}
  .layout-box .lt{font-weight:700;color:#1b5ec9;font-size:10px;}
  /* 表格：原样展现，白底不裁切，可横向滚动 */
  .layout-box.table-box{overflow:auto;background:#fff;text-shadow:none;}
  .layout-box.table-box table{border-collapse:collapse;width:100%;font-size:11px;color:#111;table-layout:fixed;}
  .layout-box.table-box th,.layout-box.table-box td{border:1px solid #999;padding:2px 4px;word-break:break-word;}
  /* 公式：单行不折行，避免被 bbox 宽度裁掉 */
  .layout-box.formula-box{overflow:visible;white-space:normal;background:rgba(255,236,180,.25);text-shadow:none;font-style:italic;}

  /* ===== 离线 LaTeX 公式渲染（无外部依赖） ===== */
  .latex{font-family:"Cambria Math","Times New Roman",Georgia,serif;font-style:italic;white-space:normal;line-height:1.4;}
  .formula-box .formula-img{max-width:100%;height:auto;display:block;border-radius:2px;}
  .latex .sup{font-size:.7em;vertical-align:.55em;line-height:0;}
  .latex .sub{font-size:.7em;vertical-align:-.25em;line-height:0;}
  .latex .frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;margin:0 .15em;}
  .latex .frac>span:first-child{border-bottom:1px solid currentColor;padding:0 .3em;line-height:1.25;}
  .latex .frac>span:last-child{padding:0 .3em;line-height:1.25;}
  .latex .sqrt{display:inline-flex;align-items:flex-start;}
  .latex .sqrt>.r{border-top:1px solid currentColor;padding:0 .2em;}
  .latex .latex-text{font-style:normal;}
  /* 图注：清晰呈现，避免重叠时看不清 */
  .layout-box.figure-box{overflow:visible;background:rgba(120,220,160,.18);}
.layout-note{color:#7e8aa8;font-size:12px;padding:12px 14px;}

  /* ===== 裁剪图网格视图 ===== */
  .crops-view{margin-top:6px;}
  .crops-head{font-size:12px;color:#9fb0d0;margin-bottom:8px;}
  .crops-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .crop-card{border:1px solid #2a3148;border-radius:8px;overflow:hidden;background:#11151f;display:flex;flex-direction:column;}
  .crop-img{display:block;width:100%;height:auto;background:#fff;min-height:40px;cursor:zoom-in;}
  .crop-img.err{display:none;}
  .crop-cap{display:flex;gap:6px;align-items:center;padding:5px 7px;font-size:11px;color:#bcd;flex-wrap:wrap;}
  .crop-idx{font-weight:700;color:#7aa2ff;}
  .crop-type{background:#2a3550;color:#bcd;border-radius:10px;padding:1px 7px;}
  .crop-dim{color:#7e8aa8;}
  .crop-fail{padding:14px;text-align:center;color:#ff8a8a;font-size:11px;border-top:1px solid #2a3148;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<header>彤熠OCR网关 (TongYiOCR) · 测试台（本机 :8088）</header>
<div class="wrap">

  <div class="engines" id="engines">
    <div class="eng"><h4><span class="dot" id="d-glmocr"></span>GLM-OCR</h4><div class="hint" id="h-glmocr">…</div><button class="sec" onclick="checkHealth('glmocr')">检查</button></div>
    <div class="eng"><h4><span class="dot" id="d-unlimited"></span>Unlimited-OCR</h4><div class="hint" id="h-unlimited">…</div><button class="sec" onclick="checkHealth('unlimited-ocr')">检查</button></div>
    <div class="eng"><h4><span class="dot" id="d-paddle"></span>PaddleOCR-VL</h4><div class="hint" id="h-paddle">…</div><button class="sec" onclick="checkHealth('paddleocr-vl')">检查</button></div>
  </div>

  <div class="card">
    <h3>解析（选图 → 选择引擎 → 同步 / 任务队列）</h3>
    <div class="row">
      <input type="file" id="imgFile" accept="image/*,.pdf"/>
      <label>引擎
        <select id="engine">
          <option value="glmocr">GLM-OCR</option>
          <option value="unlimited-ocr">Unlimited-OCR</option>
          <option value="paddleocr-vl">PaddleOCR-VL</option>
        </select>
      </label>
      <label>doc_id <input type="text" id="docId" value="web" size="8"/></label>
      <button id="btnSync" onclick="doParse()">同步解析</button>
      <button class="sec" id="btnTask" onclick="doTask()">提交任务</button>
    </div>
    <div class="hint">同步解析直接返回结果；提交任务走 /task/* 队列，可并发排队、轮询进度。支持上传 PDF（自动逐页转图后再解析）。</div>
    <div class="taskbar" id="taskbar"></div>
    <div class="progress" id="taskprog"><div></div></div>
    <pre id="out">（结果）</pre>
    <div id="pages"></div>
  </div>

  <div class="card">
    <h3>队列概览</h3>
    <div class="row"><button class="sec" onclick="queueInfo()">刷新 /task/queue/info</button></div>
    <pre id="qinfo">（点击刷新）</pre>
  </div>

  <div class="card">
    <h3>服务器实时日志 <span id="logstat" class="hint">连接中…</span></h3>
    <div class="row">
      <button class="sec" id="btnLogPause" onclick="toggleLog()">暂停</button>
      <button class="sec" onclick="clearLog()">清空</button>
      <label class="hint"><input type="checkbox" id="logAuto" checked/> 自动滚动</label>
    </div>
    <pre id="logview" style="max-height:320px;"></pre>
  </div>

</div>
<script>
const $ = s => document.querySelector(s);
let lastImageDataUrl = null;   // 最近一次上传的原图（用于排版还原底图）
function fileToB64(file){return new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(file);});}
// 响应报文预览：crops 的 base64 是巨长单行，直接整段换行会拖垮浏览器渲染（卡死）。
// 预览时把超长 base64 截断为长度提示——原图作物区本就会以图片形式展示，数据不丢。
function previewJson(obj){
  try{
    return JSON.stringify(obj, (k,v)=>{
      if(k==='base64' && typeof v==='string' && v.length>64) return '<base64 '+v.length+' 字符已省略>';
      return v;
    }, 2);
  }catch(e){ return JSON.stringify(obj,null,2); }
}
function engineKey(eng){return eng.replace('paddleocr-vl','paddle').replace('unlimited-ocr','unlimited').replace('glmocr','glmocr');}

// 引擎可选状态：下拉只展示“经健康检查确认可用”的引擎；未检查的先保留，已确认不可用的移除
const ENGINE_LABELS={ 'glmocr':'GLM-OCR', 'unlimited-ocr':'Unlimited-OCR', 'paddleocr-vl':'PaddleOCR-VL' };
const ENGINE_ORDER=['glmocr','unlimited-ocr','paddleocr-vl'];
const engineState={};          // eng -> true(可用)/false(不可用)/undefined(未检查)
let _anyHealthChecked=false;   // 是否有健康检查已返回

// 依据 engineState 重建下拉：移除确认不可用的引擎；无可用时禁用并占位提示
function rebuildEngineDropdown(){
  if(!_anyHealthChecked) return;              // 检查未返回前保留静态全部选项
  const sel=$('#engine');
  const showable=ENGINE_ORDER.filter(e=>engineState[e]!==false);  // 仅排除“已确认不可用”
  const prev=sel.value;
  sel.innerHTML='';
  if(showable.length===0){
    const o=document.createElement('option');
    o.value=''; o.textContent='（无可用引擎，请修复后点“检查”）'; o.disabled=true;
    sel.appendChild(o); sel.disabled=true;
    $('#btnSync').disabled=true; $('#btnTask').disabled=true;
    return;
  }
  sel.disabled=false; $('#btnSync').disabled=false; $('#btnTask').disabled=false;
  for(const e of showable){
    const o=document.createElement('option');
    o.value=e; o.textContent=ENGINE_LABELS[e]+(engineState[e]===true?'':'（检查中）');
    sel.appendChild(o);
  }
  // 优先保持用户当前选择（只要仍展示）；否则切到第一个已确认可用，再否则第一个
  if(showable.includes(prev)) sel.value=prev;
  else sel.value=(showable.find(e=>engineState[e]===true))||showable[0];
}

async function checkHealth(eng){
  const key=engineKey(eng);
  const dot=$('#d-'+key);
  try{
    const r=await fetch('/'+eng+'/health'); const j=await r.json();
    const ok = j.ok===true || (j.status==='ok');
    engineState[eng]=ok;
    dot.className='dot '+(ok?'on':'off');
    $('#h-'+key).textContent = ok ? (j.model_loaded!==undefined?('model_loaded='+j.model_loaded):JSON.stringify(j).slice(0,80)) : (j.engine&&j.engine.error ? j.engine.error : (j.error||j.status||'off'));
  }catch(e){ dot.className='dot off'; $('#h-'+key).textContent='请求失败'; engineState[eng]=false; }
  _anyHealthChecked=true;
  rebuildEngineDropdown();
}

function renderPages(pages){
  const box=$('#pages'); box.innerHTML='';
  if(!pages||!pages.length){box.innerHTML='<div class="hint">无页面结果</div>';return;}
  const wrap=document.createElement('div'); wrap.className='pages';
  for(const p of pages){
    const d=document.createElement('div'); d.className='page';
    const types={}; (p.elements||[]).forEach(e=>types[e.type]=(types[e.type]||0)+1);
    const chips=Object.entries(types).map(([k,v])=>`<span class="chip">${k}: ${v}</span>`).join('');
    d.innerHTML=`<div class="pmeta">page ${p.page} · ${p.width}×${p.height}px · elements=${(p.elements||[]).length} · crops=${(p.crops||[]).length}</div>
      <div class="chips">${chips}</div>
      <div class="view-tabs">
        <button data-v="md" class="active" onclick="switchView(this,'md')">Markdown</button>
        <button data-v="layout" onclick="switchView(this,'layout')">排版还原</button>
        <button data-v="crops" onclick="switchView(this,'crops')">裁剪图</button>
        <label class="hint"><input type="checkbox" checked onchange="toggleBorders(this)"/> 显示边框</label>
        <label class="hint"><input type="checkbox" onchange="toggleOriginal(this)"/> 显示原图</label>
      </div>
      <div class="pview pview-md"></div>
      <div class="pview pview-layout hidden"></div>
      <div class="pview pview-crops hidden"></div>`;
    // Markdown 视图（结构化渲染）
    const mdEl=document.createElement('div'); mdEl.className='md-render';
    mdEl.innerHTML = renderMarkdown(p.markdown||'');
    d.querySelector('.pview-md').appendChild(mdEl);
    // 排版还原视图（原图底 + bbox 叠加）；PDF 每页用各自的 page_image 作背景
    d.querySelector('.pview-layout').appendChild(buildLayoutView(p, p.page_image || lastImageDataUrl));
    // 裁剪图视图（所有识别后的原图裁切）
    d.querySelector('.pview-crops').appendChild(buildCropsView(p));
    wrap.appendChild(d);
  }
  box.appendChild(wrap);
}

function switchView(btn, v){
  const page=btn.closest('.page');
  page.querySelectorAll('.view-tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  page.querySelector('.pview-md').classList.toggle('hidden', v!=='md');
  page.querySelector('.pview-layout').classList.toggle('hidden', v!=='layout');
  page.querySelector('.pview-crops').classList.toggle('hidden', v!=='crops');
}

function toggleOriginal(cb){
  const page=cb.closest('.page');
  const lp=page.querySelector('.layout-page');
  if(lp) lp.classList.toggle('show-original', cb.checked);
}

function toggleBorders(cb){
  const page=cb.closest('.page');
  page.querySelectorAll('.layout-box').forEach(b=>b.classList.toggle('show-border', cb.checked));
}

// 用解析出的 bbox 在页面上还原排版：原图作底，文字框按坐标绝对定位叠加
// 支持滚轮/滑块缩放（10%~300%），默认 100% 原始尺寸
function buildLayoutView(p, imgUrl){
  const W=p.width||1, H=p.height||1;
  const outer=document.createElement('div'); outer.className='layout-wrap';

  // 工具栏
  const tb=document.createElement('div'); tb.className='layout-toolbar';
  const zLabel=document.createElement('span'); zLabel.className='layout-zoom-label'; zLabel.textContent='100%';
  const slider=document.createElement('input'); slider.type='range'; slider.min='10'; slider.max='300'; slider.value='100'; slider.step='10';
  const resetBtn=document.createElement('button'); resetBtn.className='sec'; resetBtn.textContent='重置缩放';
  const status=document.createElement('span'); status.className='layout-img-status'; status.textContent='加载中…';
  tb.appendChild(document.createTextNode('缩放 '));tb.appendChild(slider);tb.appendChild(zLabel);
  tb.appendChild(resetBtn);tb.appendChild(status);
  outer.appendChild(tb);

  // 视图容器
  const wrap=document.createElement('div'); wrap.className='layout-view';
  const page=document.createElement('div'); page.className='layout-page';

  // 原图底图
  if(imgUrl){
    const img=document.createElement('img'); img.className='bg';
    img.alt='排版还原底图'; img.src=imgUrl;
    img.onload=function(){
      status.className='layout-img-status';
      status.textContent='原图就绪 '+this.naturalWidth+'×'+this.naturalHeight+'px（默认隐藏，勾选“显示原图”对照）';
      setZoom(parseInt(slider.value,10));
    };
    img.onerror=function(){
      status.className='layout-img-status err'; status.textContent='✗ 加载失败';
    };
    page.appendChild(img);
  } else {
    // 无原图：按页面宽高比撑开还原层，保证 bbox 叠加仍有尺寸基准
    page.style.aspectRatio = W + ' / ' + H;
    page.style.width = '100%';
    status.className='layout-img-status err'; status.textContent='⚠ 无原图（仅还原层）';
  }

  // 文字框（百分比坐标 → 相对 page 定位）
  // 预建 crop 索引：按 element_idx 或 bbox 近似匹配，供 figure 等类型内嵌图片
  const crops=p.crops||[];
  const cropByIndex={};
  const cropByBbox=[];   // [{bbox:[x1,y1,x2,y2], base64}]
  for(let ci=0;ci<crops.length;ci++){
    const c=crops[ci];
    if(c.base64) {
      if(typeof c.element_index==='number'){ cropByIndex[c.element_index]=c.base64; }
      if(Array.isArray(c.bbox)&&c.bbox.length===4){ cropByBbox.push({bbox:c.bbox, base64:c.base64}); }
    }
  }
  // bbox IoU 辅助：找最重叠的 crop
  function findCropBbox(x1,y1,x2,y2){
    let best=null, bestIoU=0;
    for(const cb of cropByBbox){
      const ix1=Math.max(x1,cb.bbox[0]), iy1=Math.max(y1,cb.bbox[1]);
      const ix2=Math.min(x2,cb.bbox[2]), iy2=Math.min(y2,cb.bbox[3]);
      if(ix2<=ix1||iy2<=iy1) continue;
      const inter=(ix2-ix1)*(iy2-iy1);
      const area=(x2-x1)*(y2-y1), cArea=(cb.bbox[2]-cb.bbox[0])*(cb.bbox[3]-cb.bbox[1]);
      const iou=inter/(Math.min(area,cArea)||1);
      if(iou>bestIoU){bestIoU=iou; best=cb.base64;}
    }
    return best;
  }

  const els=p.elements||[]; let placed=0;
  for(let ei=0;ei<els.length;ei++){
    const e=els[ei];
    const b=e.bbox;
    if(!Array.isArray(b)||b.length!==4) continue;
    const [x1,y1,x2,y2]=b;
    if(x2<=x1||y2<=y1) continue;
    const box=document.createElement('div'); box.className='layout-box show-border';
    if(e.type==='table') box.classList.add('table-box');
    else if(e.type==='formula') box.classList.add('formula-box');
    else if(e.type==='figure') box.classList.add('figure-box');
    box.style.left=(x1/W*100)+'%'; box.style.top=(y1/H*100)+'%';
    box.style.width=((x2-x1)/W*100)+'%'; box.style.height=((y2-y1)/H*100)+'%';
    if(e.type==='table' && e.html){
      box.innerHTML=`<div class="lt">[表格]</div>${e.html}`;
    } else if(e.type==='figure'){
      // 优先用 element_index 精确匹配，其次 bbox IoU 模糊匹配
      const imgSrc=cropByIndex[ei]||findCropBbox(x1,y1,x2,y2);
      if(imgSrc){
        const img=document.createElement('img'); img.src=imgSrc; img.alt=e.caption||e.content||'图'+ei;
        img.onerror=function(){ this.style.display='none'; box.textContent='🖼 '+(e.caption||e.content||'加载失败'); };
        box.appendChild(img);
      } else {
        box.textContent='🖼 '+(e.caption||e.content||'');
      }
    } else if(e.type==='formula'){
      const lab=document.createElement('div'); lab.className='lt'; lab.textContent='[公式]';
      const fx=document.createElement('span'); fx.className='latex';
      const tex = e.latex || e.content || '';
      if(tex){
        fx.innerHTML = renderLatex(tex);
      } else {
        // 公式未被识别为 LaTeX：尝试展示该区域原图裁切，否则标注未识别
        const crop = cropByIndex[ei] || findCropBbox(x1,y1,x2,y2);
        if(crop){
          const img=document.createElement('img'); img.src=crop; img.className='formula-img'; img.alt='公式原图';
          fx.appendChild(img);
        } else {
          fx.textContent='（公式未识别）';
        }
      }
      box.appendChild(lab); box.appendChild(fx);
    } else {
      // 普通文字框：渲染其中的行内 $...$ 公式（如 $\triangle ABC$）
      box.innerHTML = renderInlineLatex(e.content||'');
    }
    page.appendChild(box); placed++;
  }
  wrap.appendChild(page);
  outer.appendChild(wrap);

  // 缩放控制（CSS transform，不影响布局计算）
  function setZoom(pct){
    zLabel.textContent=pct+'%';
    page.style.transform='scale('+pct/100+')';
    page.style.transformOrigin='top left';
  }
  slider.oninput=function(){ setZoom(parseInt(this.value,10)); };
  resetBtn.onclick=function(){ slider.value=100; setZoom(100); };
  wrap.onwheel=function(ev){
    ev.preventDefault();
    let v=parseInt(slider.value,10)||100;
    v+=ev.deltaY<0?10:-10;
    v=Math.max(10,Math.min(300,v));
    slider.value=v; setZoom(v);
  };

  if(placed===0){
    const note=document.createElement('div'); note.className='layout-note';
    note.textContent=imgUrl?'该引擎未返回 bbox，无法还原排版 —— 请切换 Markdown 视图。':'无坐标且无原图。';
    wrap.appendChild(note);
  }
  return outer;
}

// 裁剪图视图：把该页所有"识别后的原图裁切"以网格形式展示，便于核对引擎到底裁出了什么
function buildCropsView(p){
  const crops=p.crops||[];
  const outer=document.createElement('div'); outer.className='crops-view';
  const head=document.createElement('div'); head.className='crops-head';
  head.textContent = crops.length ? ('共 '+crops.length+' 张裁剪图（识别后的原图裁切，按 element 顺序排列）') : '该引擎未返回裁剪图';
  outer.appendChild(head);
  if(!crops.length) return outer;
  const grid=document.createElement('div'); grid.className='crops-grid';
  // element_index -> element 映射，用于给裁剪图标上类型
  const elByIndex={};
  (p.elements||[]).forEach((e,idx)=>{ elByIndex[idx]=e; });
  crops.forEach((c,ci)=>{
    const card=document.createElement('div'); card.className='crop-card';
    const img=document.createElement('img'); img.className='crop-img';
    img.loading='lazy';
    img.alt=c.filename||('crop'+ci);
    img.src=c.base64;
    img.onerror=function(){ this.classList.add('err'); };
    const dim = (c.bbox&&c.bbox.length===4) ? (Math.round(c.bbox[2]-c.bbox[0])+'×'+Math.round(c.bbox[3]-c.bbox[1])) : '';
    let typeLabel='';
    if(typeof c.element_index==='number' && elByIndex[c.element_index]) typeLabel=elByIndex[c.element_index].type;
    const cap=document.createElement('div'); cap.className='crop-cap';
    let html='<span class="crop-idx">#'+(ci+1)+'</span>';
    if(typeLabel) html+='<span class="crop-type">'+typeLabel+'</span>';
    if(dim) html+='<span class="crop-dim">'+dim+'px</span>';
    cap.innerHTML=html;
    card.appendChild(img);
    card.appendChild(cap);
    // 点击放大（新标签打开原图 base64）
    img.onclick=function(){ if(!this.classList.contains('err')) window.open(this.src,'_blank'); };
    grid.appendChild(card);
  });
  outer.appendChild(grid);
  return outer;
}

// ===== 离线 LaTeX 公式渲染（无外部依赖，覆盖 OCR 常见子集）=====
// 把 $...$ / \(...\) / \[...\] 形式的 LaTeX 渲染为 HTML（希腊字母 / 分式 / 上下标 / 根号 / 常见符号）
const _LATEX_SYMBOLS = {
  alpha:'α',beta:'β',gamma:'γ',delta:'δ',epsilon:'ε',varepsilon:'ε',zeta:'ζ',eta:'η',theta:'θ',vartheta:'ϑ',iota:'ι',kappa:'κ',lambda:'λ',mu:'μ',nu:'ν',xi:'ξ',pi:'π',rho:'ρ',sigma:'σ',tau:'τ',upsilon:'υ',phi:'φ',varphi:'ϕ',chi:'χ',psi:'ψ',omega:'ω',
  Gamma:'Γ',Delta:'Δ',Theta:'Θ',Lambda:'Λ',Xi:'Ξ',Pi:'Π',Sigma:'Σ',Phi:'Φ',Psi:'Ψ',Omega:'Ω',
  varnothing:'∅',emptyset:'∅',
  times:'×',cdot:'·',div:'÷',pm:'±',mp:'∓',ast:'∗',star:'⋆',bullet:'∙',circ:'°',
  leq:'≤',le:'≤',geq:'≥',ge:'≥',neq:'≠',ne:'≠',approx:'≈',equiv:'≡',sim:'∼',simeq:'≃',cong:'≅',propto:'∝',
  infty:'∞',partial:'∂',nabla:'∇',forall:'∀',exists:'∃',neg:'¬',
  angle:'∠',measuredangle:'∡',perp:'⊥',parallel:'∥',
  sum:'∑',prod:'∏',coprod:'∐',int:'∫',oint:'∮',iint:'∬',iiint:'∭',
  cup:'∪',cap:'∩',subset:'⊂',supset:'⊃',subseteq:'⊆',supseteq:'⊇',in:'∈',notin:'∉',ni:'∋',
  rightarrow:'→',to:'→',gets:'←',leftarrow:'←',Rightarrow:'⇒',Leftarrow:'⇐',leftrightarrow:'↔',Leftrightarrow:'⇔',mapsto:'↦',uparrow:'↑',downarrow:'↓',
  cdots:'⋯',ldots:'…',dots:'…',vdots:'⋮',ddots:'⋱',
  quad:' ',qquad:'  ',space:' ',
  vee:'∨',wedge:'∧',oplus:'⊕',otimes:'⊗',odot:'⊙',
  prime:'′',degree:'°',deg:'°',
  triangle:'△',square:'□',diamond:'◇',clubsuit:'♣',spadesuit:'♠',heartsuit:'♥',
  lceil:'⌈',rceil:'⌉',lfloor:'⌊',rfloor:'⌋'
};
function _parseLatex(tex, sym, start){
  let p = start || 0; const len = tex.length; let html = '';
  const esc = c => c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  function readGroup(){
    if(tex[p] !== '{'){ return readToken(); }
    // 按括号深度截取本组字符串（含嵌套），再单独解析，避免吞掉兄弟组
    let depth = 0, start = p + 1;
    while(p < len){
      const c = tex[p];
      if(c === '{') depth++;
      else if(c === '}'){ depth--; if(depth === 0) break; }
      p++;
    }
    const inner = tex.slice(start, p);
    if(tex[p] === '}') p++; // 消费本组闭括号
    return { html: _parseLatex(inner, sym, 0).html };
  }
  function readToken(){
    if(tex[p] === '{') return readGroup();
    if(tex[p] === '\\'){ const r = _parseLatex(tex, sym, p); p = r.next; return {html:r.html}; }
    const ch = tex[p];
    if(ch === undefined || ch === '^' || ch === '_' || ch === '}' || ch === '{') return {html:''};
    p++; return {html: esc(ch)};
  }
  while(p < len){
    const c = tex[p];
    if(c === '\\'){
      let j = p + 1;
      if(j < len && /[a-zA-Z]/.test(tex[j])){
        let name = ''; while(j < len && /[a-zA-Z]/.test(tex[j])){ name += tex[j]; j++; }
        p = j;
        if(name === 'frac' || name === 'dfrac' || name === 'tfrac'){
          const a = readGroup(), b = readGroup();
          html += '<span class="frac"><span>'+a.html+'</span><span>'+b.html+'</span></span>';
        } else if(name === 'sqrt'){
          let idx = '';
          if(tex[p] === '['){ let k = p + 1; while(k < len && tex[k] !== ']'){ k++; } idx = tex.slice(p + 1, k); p = k + 1; }
          const a = readGroup();
          html += '<span class="sqrt">√<span class="r">'+(idx ? '<span class="sup">'+esc(idx)+'</span>' : '')+a.html+'</span></span>';
        } else if(['text','mathrm','mathbf','mathit','mathbb','mathsf','mbox'].includes(name)){
          const a = readGroup(); html += '<span class="latex-text">'+a.html+'</span>';
        } else if(sym[name] !== undefined){
          html += sym[name];
        } // 未知命令（\left \right \begin 等）跳过
      } else {
        const ch = tex[p + 1];
        if(ch === ' ' || ch === ',' || ch === ';' || ch === ':'){ /* 间距，忽略 */ }
        else if(ch === '\\'){ /* 换行，忽略 */ }
        else if(ch){ html += esc(ch); }
        p += (ch ? 2 : 1);
      }
    } else if(c === '{'){
      const g = readGroup(); html += g.html;
    } else if(c === '^'){
      p++; const t = readToken(); html += '<span class="sup">'+t.html+'</span>';
    } else if(c === '_'){
      p++; const t = readToken(); html += '<span class="sub">'+t.html+'</span>';
    } else if(c === '}'){ p++; break;
    } else { html += esc(c); p++; }
  }
  return {html, next:p};
}
function renderLatex(tex){
  if(tex == null) return '';
  tex = String(tex).replace(/^\s*[\$]+/, '').replace(/[\$]+\s*$/, '').trim();
  if(!tex) return '';
  try { return _parseLatex(tex, _LATEX_SYMBOLS, 0).html || ''; }
  catch(e){ return String(tex); }
}

// 行内公式渲染：把文本中的 $...$ / $$...$$ 替换为渲染后的数学样式，
// 非公式部分保持原样（仅做 HTML 转义）。仅用于「排版还原」视图。
function renderInlineLatex(text){
  if(!text) return '';
  const esc = c => c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let html = '';
  const re = /\$\$([\s\S]+?)\$\$|\$([^\$\n]+?)\$/g;
  let last = 0, m;
  while((m = re.exec(text))){
    if(m.index > last) html += esc(text.slice(last, m.index));
    const tex = (m[1] != null ? m[1] : m[2]).trim();
    if(tex) html += '<span class="latex">' + renderLatex(tex) + '</span>';
    last = re.lastIndex;
  }
  if(last < text.length) html += esc(text.slice(last));
  return html || esc(text);
}

// ===== 轻量 Markdown → HTML（离线、无外部依赖）=====
function renderMarkdown(md){
  if(!md) return '';
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inline = s => {
    // Markdown 视图只做轻量文本格式化，不渲染公式（公式渲染在「排版还原」视图内完成）
    s = esc(s);
    s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, (m,a,u)=>`<img alt="${a}" src="${u}"/>`);
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m,t,u)=>`<a href="${u}" target="_blank" rel="noopener">${t}</a>`);
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*\s][^*]*?)\*/g, '$1<em>$2</em>');
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    return s;
  };
  const isTableSep = l => /^\s*\|?[\s:|-]+\|?\s*$/.test(l) && l.includes('-');
  const splitRow = l => l.split('|').map(c=>c.trim()).filter((c,i,a)=>!(i===0&&c==='')&&!(i===a.length-1&&c===''));
  const lines = md.replace(/\r\n/g,'\n').split('\n');
  let html='', i=0, inCode=false, codeBuf=[];
  const isBlockStart = l => /^(#{1,6})\s/.test(l) || /^\s*[-*+]\s+/.test(l) || /^\s*\d+\.\s+/.test(l) || l.startsWith('```') || l.startsWith('>') || (l.includes('|') && i+1<lines.length && isTableSep(lines[i+1]));
  while(i<lines.length){
    const line=lines[i];
    if(line.startsWith('```')){
      if(!inCode){ inCode=true; codeBuf=[]; }
      else { html+='<pre><code>'+esc(codeBuf.join('\n'))+'</code></pre>'; inCode=false; }
      i++; continue;
    }
    if(inCode){ codeBuf.push(line); i++; continue; }
    if(line.includes('|') && i+1<lines.length && isTableSep(lines[i+1])){
      const head=splitRow(line); i+=2;
      const rows=[];
      while(i<lines.length && lines[i].includes('|')){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+head.map(h=>`<th>${inline(h)}</th>`).join('')+'</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'+r.map(c=>`<td>${inline(c)}</td>`).join('')+'</tr>'; }
      html+=t+'</tbody></table>'; continue;
    }
    const mh=line.match(/^(#{1,6})\s+(.*)$/);
    if(mh){ const lvl=mh[1].length; html+=`<h${lvl}>${inline(mh[2])}</h${lvl}>`; i++; continue; }
    if(/^(\s*[-*_]){3,}\s*$/.test(line)){ html+='<hr/>'; i++; continue; }
    if(line.startsWith('>')){
      const bq=[]; while(i<lines.length && lines[i].startsWith('>')){ bq.push(lines[i].replace(/^>\s?/,'')); i++; }
      html+='<blockquote>'+inline(bq.join(' '))+'</blockquote>'; continue;
    }
    if(/^\s*[-*+]\s+/.test(line)){
      const items=[]; while(i<lines.length && /^\s*[-*+]\s+/.test(lines[i])){ items.push(lines[i].replace(/^\s*[-*+]\s+/,'')); i++; }
      html+='<ul>'+items.map(it=>`<li>${inline(it)}</li>`).join('')+'</ul>'; continue;
    }
    if(/^\s*\d+\.\s+/.test(line)){
      const items=[]; while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ items.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; }
      html+='<ol>'+items.map(it=>`<li>${inline(it)}</li>`).join('')+'</ol>'; continue;
    }
    if(line.trim()===''){ i++; continue; }
    const para=[line]; i++;
    while(i<lines.length && lines[i].trim()!=='' && !isBlockStart(lines[i])){ para.push(lines[i]); i++; }
    html+='<p>'+inline(para.join(' '))+'</p>';
  }
  if(inCode){ html+='<pre><code>'+esc(codeBuf.join('\n'))+'</code></pre>'; }
  return html;
}

async function doParse(){
  const f=$('#imgFile').files[0]; if(!f){alert('请选择图片或PDF');return;}
  const eng=$('#engine').value;
  const isPdf=(f.type==='application/pdf')||/\.pdf$/i.test(f.name);
  $('#out').textContent='请求中…'; renderPages([]);
  try{
    let j;
    if(isPdf){
      // PDF：走 /<eng>/parse_pdf（后端 PDF → 每页图片 → 引擎解析）
      const fd=new FormData();
      fd.append('file', f);
      fd.append('doc_id', $('#docId').value);
      if(eng==='unlimited-ocr') fd.append('prompt','请准确识别图片中的所有文字，保持原始排版');
      if(eng==='paddleocr-vl'){ fd.append('task_type','general'); fd.append('language','ch'); }
      $('#out').textContent='PDF 转图 + 解析中…';
      const r=await fetch('/'+eng+'/parse_pdf',{method:'POST',body:fd});
      j=await r.json();
      lastImageDataUrl=null;   // 多页 PDF 用每页 page_image 作背景
    } else {
      const b64=await fileToB64(f);
      lastImageDataUrl=b64;
      let body;
      if(eng==='glmocr') body={images:[b64], doc_id:$('#docId').value};
      else if(eng==='unlimited-ocr') body={images:[b64], doc_id:$('#docId').value, prompt:'请准确识别图片中的所有文字，保持原始排版'};
      else body={images:[{page:1,image_data:b64}], task_type:'general', language:'ch', doc_id:$('#docId').value};
      const r=await fetch('/'+eng+'/parse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      j=await r.json();
    }
    $('#out').textContent=previewJson(j);
    renderPages(j.pages);
  }catch(e){ $('#out').textContent='错误: '+e; }
}

let _pollTimer=null;
async function doTask(){
  const f=$('#imgFile').files[0]; if(!f){alert('请选择图片或PDF');return;}
  const eng=$('#engine').value;
  const isPdf=(f.type==='application/pdf')||/\.pdf$/i.test(f.name);
  let url='/task/submit', useForm=false, body=null, fd=null;
  if(isPdf){
    fd=new FormData();
    fd.append('file', f);
    fd.append('engine', eng);
    fd.append('doc_id', $('#docId').value);
    if(eng==='unlimited-ocr') fd.append('prompt','请准确识别图片中的所有文字，保持原始排版');
    if(eng==='paddleocr-vl'){ fd.append('task_type','general'); fd.append('language','ch'); }
    useForm=true; url='/task/submit_pdf';
    lastImageDataUrl=null;
  } else {
    const b64=await fileToB64(f);
    lastImageDataUrl=b64;
    body={engine:eng, images:[b64], doc_id:$('#docId').value};
    if(eng==='unlimited-ocr') body.prompt='请准确识别图片中的所有文字，保持原始排版';
    if(eng==='paddleocr-vl'){body.task_type='general';body.language='ch';}
  }
  $('#taskbar').textContent='提交中…';
  try{
    const init={method:'POST'};
    if(useForm) init.body=fd;
    else { init.headers={'Content-Type':'application/json'}; init.body=JSON.stringify(body); }
    const r=await fetch(url, init);
    const j=await r.json();
    if(!j.task_id){ $('#taskbar').textContent='提交失败: '+JSON.stringify(j); return; }
    $('#taskbar').textContent=`task_id=${j.task_id} status=${j.status} position=${j.position} est=${j.estimated_wait_seconds}s`;
    pollTask(j.task_id);
  }catch(e){ $('#taskbar').textContent='提交错误: '+e; }
}

function pollTask(id){
  if(_pollTimer) clearInterval(_pollTimer);
  _pollTimer=setInterval(async()=>{
    try{
      const s=await (await fetch('/task/'+id+'/status')).json();
      $('#taskbar').textContent=`task_id=${id} status=${s.status} progress=${s.progress??''} page=${s.current_page??''}/${s.total_pages??''} pos=${s.position??''} ${s.error?('err='+s.error):''}`;
      $('#taskprog>div').style.width=(s.progress||0)+'%';
      if(['completed','failed','cancelled'].includes(s.status)){
        clearInterval(_pollTimer);
        const res=await (await fetch('/task/'+id+'/result')).json();
        $('#out').textContent=previewJson(res);
        renderPages(res.pages);
      }
    }catch(e){ $('#taskbar').textContent='轮询错误: '+e; }
  },2500);
}

  catch(e){ $('#qinfo').textContent='错误: '+e; }
}

// ============ 服务器实时日志（SSE /logs/stream） ============
let _es = null, _logPaused = false;
function startLog(){
  if(_es) return;
  try { _es = new EventSource('/logs/stream'); }
  catch(e){ $('#logstat').textContent='○ 浏览器不支持'; return; }
  _es.onopen  = () => { $('#logstat').textContent='● 已连接'; };
  _es.onerror = () => { $('#logstat').textContent='○ 断开，重连中…'; };
  _es.onmessage = (ev) => {
    if(_logPaused) return;
    let e; try { e = JSON.parse(ev.data); } catch(_) { return; }
    appendLog(e);
  };
}
function appendLog(e){
  const pre = $('#logview');
  const q = e.query ? ('?'+e.query) : '';
  const t = (e.ts||'').slice(11,19);
  const div = document.createElement('div');
  div.className = 'logline';
  div.textContent = `[${t}] ${e.method} ${e.path}${q} → ${e.status} (${e.duration_ms}ms) ${e.client}`;
  div.style.color = e.status>=500 ? '#ff7a7a' : (e.status>=400 ? '#ffd27a' : '#9fe6b0');
  pre.appendChild(div);
  while(pre.childElementCount > 300) pre.removeChild(pre.firstChild);
  if($('#logAuto').checked) pre.scrollTop = pre.scrollHeight;
}
function toggleLog(){
  _logPaused = !_logPaused;
  $('#btnLogPause').textContent = _logPaused ? '继续' : '暂停';
  $('#logstat').textContent = _logPaused ? '⏸ 已暂停' : '● 已连接';
}
function clearLog(){ $('#logview').innerHTML = ''; }
startLog();
</script>
